name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout expense-service
        uses: actions/checkout@v4
        with:
          path: expense-service

      - name: Checkout common
        uses: actions/checkout@v4
        with:
          repository: hieuvu121/expenshie-common
          path: common

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install common module
        run: mvn -f common/pom.xml install -DskipTests -B

      - name: Build with Maven
        run: mvn -f expense-service/pom.xml -B package

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push docker img
        run: |
          cp expense-service/Dockerfile ./Dockerfile
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/expensemanagementapp-expense_service:latest \
            --push .

      - name: SSH to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user
            docker compose pull expense-service
            docker compose up -d expense-service
            docker ps
